name: CD — Build, Push & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/bloomkookie/ammachi-ai-platform/backend
  FRONTEND_IMAGE: ghcr.io/bloomkookie/ammachi-ai-platform/frontend

jobs:
  # ── Build & Push Docker images to GHCR ──────────────────────
  build-and-push:
    name: Build & Push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./ammachi_django_backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE=
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to server via SSH ────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose & nginx config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.yml,nginx/,.env.example"
          target: ~/ammachi-app

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/ammachi-app

            # Log in to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Create .env from secrets if not exists
            cat > .env << 'EOF'
            DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            DJANGO_DEBUG=False
            DJANGO_ALLOWED_HOSTS=${{ secrets.DEPLOY_HOST }}
            CORS_ALLOWED_ORIGINS=http://${{ secrets.DEPLOY_HOST }}
            CSRF_TRUSTED_ORIGINS=http://${{ secrets.DEPLOY_HOST }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}
            PLANT_ID_KEY=${{ secrets.PLANT_ID_KEY }}
            MARKET_API_KEY=${{ secrets.MARKET_API_KEY }}
            EOF

            # Override image names to use GHCR images
            export BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:latest
            export FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}:latest

            # Pull latest images and restart
            docker compose pull
            docker compose up -d --force-recreate --remove-orphans

            # Clean up old images
            docker image prune -f

            echo "✅ Deployment complete!"
