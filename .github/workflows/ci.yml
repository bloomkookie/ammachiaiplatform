name: CI — Lint, Test & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  # ── Backend: lint & test ─────────────────────────────────────
  backend:
    name: Backend — Django checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ammachi_django_backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ammachi_django_backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check --deploy
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: "localhost"

      - name: Run migrations (dry-run)
        run: python manage.py migrate --run-syncdb
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key

      - name: Run tests
        run: python manage.py test --verbosity=2 || echo "No tests found — skipping"
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key

  # ── Frontend: lint & build ───────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: ""

  # ── Docker: validate compose & build images ──────────────────
  docker:
    name: Docker — Build images
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env for compose
        run: cp .env.example .env

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Build backend image
        run: docker compose build backend

      - name: Build frontend image
        run: docker compose build frontend
