services:
  # ── Django Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./ammachi_django_backend
      dockerfile: Dockerfile
    container_name: ammachi-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CORS_ALLOWED_ORIGINS=http://localhost,http://127.0.0.1
      - CSRF_TRUSTED_ORIGINS=http://localhost,http://127.0.0.1
    volumes:
      - backend-data:/app/db.sqlite3
      - backend-static:/app/staticfiles
    expose:
      - "8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/test-gemini')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── React Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""
    container_name: ammachi-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ammachi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  backend-data:
  backend-static:
